name: Daily Appointments Notifier

on:
  schedule:
    - cron: "30 2 * * *"  # 08:00 IST (02:30 UTC) every day
  workflow_dispatch:       # allows manual "Run workflow" button for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread oauth2client pandas python-dotenv requests pyyaml

      - name: Write Google service account credentials
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials/docregistry-credentials_bk.json.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Install twilio
        run: pip install twilio

      - name: Run daily appointments notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAILEYS_API_KEY: ${{ secrets.BAILEYS_API_KEY }}
        run: python daily_appointments_notifier.py
