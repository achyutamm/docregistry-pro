name: Daily Appointments Notifier

on:
  schedule:
    - cron: "30 10 * * *"  # Reminder 1 — 16:00 IST (10:30 UTC) day before appointment
    - cron: "30 0 * * *"   # Reminder 2 —  06:00 IST (00:30 UTC) day of appointment
  workflow_dispatch:
    inputs:
      reminder:
        description: "Reminder number (1 = day-before 5PM, 2 = day-of 9AM)"
        required: false
        default: "2"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread oauth2client pandas python-dotenv requests pyyaml twilio

      - name: Write Google service account credentials
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials/docregistry-credentials_bk.json.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Determine reminder number
        id: reminder
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "num=${{ github.event.inputs.reminder }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 10 * * *" ]; then
            echo "num=1" >> $GITHUB_OUTPUT
          else
            echo "num=2" >> $GITHUB_OUTPUT
          fi

      - name: Run daily appointments notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BAILEYS_API_KEY: ${{ secrets.BAILEYS_API_KEY }}
        run: python daily_appointments_notifier.py --reminder=${{ steps.reminder.outputs.num }}
